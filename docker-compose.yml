services:
  rental-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rental-demo-api
    ports:
      - "${API_HOST_PORT:-8102}:8000"
    environment:
      DEMO_MODE: "${DEMO_MODE:-true}"
      CORS_ORIGINS: "http://localhost:${WEB_HOST_PORT:-3102},http://127.0.0.1:${WEB_HOST_PORT:-3102}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      WECOM_WEBHOOK_URL: "${WECOM_WEBHOOK_URL:-}"
      GOOGLE_PLACES_API_KEY: "${GOOGLE_PLACES_API_KEY:-}"
    volumes:
      - ./db:/app/db
      - ./artifacts:/app/artifacts
      - ./seed:/app/seed

  rental-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rental-demo-web
    ports:
      - "${WEB_HOST_PORT:-3102}:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:${API_HOST_PORT:-8102}"
    depends_on:
      - rental-api
